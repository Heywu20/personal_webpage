<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heywu`s website</title>

<link rel="icon" type="image/svg+xml" href="assets/icons/icon-dark.svg" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/svg+xml" href="assets/icons/icon-light.svg" media="(prefers-color-scheme: light)">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f1117;
  --glass: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(255, 255, 255, 0.18);
  --accent1: #a855f7;
  --accent2: #ec4899;
  --text: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  max-width: 100%;
  overflow-x: hidden;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}


.background {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 0;
}


.background-shape {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.7;
  pointer-events: none;
  will-change: transform;
}


.shape1 {
  width: 60vw;
  height: 60vw;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  top: -20vw;
  right: -10vw;
  animation: float1 28s ease-in-out infinite alternate;
}


.shape2 {
  width: 50vw;
  height: 50vw;
  background: linear-gradient(135deg, #6366f1, var(--accent1));
  bottom: -20vw;
  left: -15vw;
  animation: float2 34s ease-in-out infinite alternate;
}


@keyframes float1 {
  0% {
    transform: translate(0, 0) scale(1);
  }
  50% {
    transform: translate(-3vw, 2vw) scale(1.1);
  }
  100% {
    transform: translate(2vw, -3vw) scale(0.95);
  }
}

@keyframes float2 {
  0% {
    transform: translate(0, 0) scale(1);
  }
  50% {
    transform: translate(4vw, -2vw) scale(1.08);
  }
  100% {
    transform: translate(-2vw, 3vw) scale(0.9);
  }
}


.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 600px;
  padding: clamp(24px, 5vw, 60px);
  border-radius: 24px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  text-align: center;
}

.dots {
  position: absolute;
  top: 16px;
  left: 20px;
  display: flex;
  gap: 6px;
}

.dot {
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
}

h1 {
  font-size: clamp(1.8rem, 6vw, 3rem);
  font-weight: 800;
  margin-bottom: 16px;
}

h1 span {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  font-size: clamp(0.9rem, 3.5vw, 1rem);
  opacity: 0.8;
  margin-bottom: 24px;
}

button {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: white;
  transition: 0.3s ease;
  white-space: nowrap;
}

button:hover {
  transform: translateY(-2px);
}

@media (max-width: 480px) {
  form {
    flex-direction: column;
  }

  button {
    width: 100%;
  }
}
</style>
</head>
<body>

<div class="background">
  <div class="background-shape shape1"></div>
  <div class="background-shape shape2"></div>
</div>

<div class="card">
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <h1><span>Coming</span> Soon</h1>
  <p>Redesign in progress. Stay tuned.</p>

  <button id="tgBtn">Contact</button>

  <script>
  (function () {
    const encdlink = "aHR0cHM6Ly90Lm1lL2hleXd1X2Rldg==";

    document.getElementById("tgBtn").onclick = function () {
      const url = atob(encdlink);
      window.open(url, "_blank", "noopener,noreferrer");
    };
  })();
  </script>

</body>
</html>
